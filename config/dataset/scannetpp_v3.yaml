defaults:
  - base_dataset
  - view_sampler: boundedv3
  - optional view_sampler_dataset_specific_config@view_sampler: boundedv3_scannetpp

name: scannetpp
roots:
  - "${oc.env:SCANNETPP_DSLR_ROOT,./data/scannetpp/dslr}"
  - "${oc.env:SCANNETPP_IPHONE_ROOT,./data/scannetpp/iphone}"

input_image_shape: [256, 256]
original_image_shape: [720, 960]
cameras_are_circular: false

baseline_min: 1e-3
baseline_max: 1e2
max_fov: 120.0

skip_bad_shape: false
